<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Salary &amp; Expenses - Open Month</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#19e65e",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112116",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none;  scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display h-screen flex flex-col overflow-hidden text-slate-900 dark:text-white antialiased selection:bg-primary selection:text-background-dark">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-5 pt-6 pb-2 shrink-0 z-20 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-1 cursor-pointer group hover:opacity-80 transition-opacity">
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em]">January 2026</h2>
<span class="material-symbols-outlined text-gray-500 dark:text-gray-400 group-hover:text-primary transition-colors">expand_more</span>
</div>
<div class="flex items-center justify-end px-3 py-1 rounded-full bg-primary/10 border border-primary/20">
<p class="text-primary text-xs font-bold leading-normal tracking-[0.05em] uppercase">OPEN</p>
</div>
</header>
<!-- Scrollable Content Area -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-40">
<!-- Salary Section (HeadlineText + TextField + MetaText combined) -->
<section class="px-5 pt-6 pb-2">
<div class="flex flex-col">
<label class="text-gray-500 dark:text-gray-400 text-sm font-semibold tracking-wide uppercase mb-1">Monthly Salary</label>
<!-- Editable Big Input -->
<div class="relative group">
<input class="w-full bg-transparent border-none p-0 text-[42px] font-extrabold text-slate-900 dark:text-white focus:ring-0 placeholder-gray-600 tracking-tight leading-none h-16 caret-primary" type="text" value="$5,000"/>
<div class="absolute right-0 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-gray-500">edit</span>
</div>
</div>
<div class="flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-[18px] text-primary">check_circle</span>
<p class="text-primary/80 text-sm font-medium">Entered on: Jan 1</p>
</div>
</div>
</section>
<!-- Spacer -->
<div class="h-6 w-full"></div>
<!-- Planned Expenses Header (SectionHeader) -->
<section class="px-5">
<h3 class="text-lg font-bold leading-tight tracking-[-0.015em] mb-4 flex items-center gap-2">
                Planned Expenses
                <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
</h3>
<!-- Expense List -->
<div class="flex flex-col gap-3">
<!-- Expense Item 1: Food -->
<div class="bg-white dark:bg-[#1A2C22] p-4 rounded-xl shadow-sm border border-gray-100 dark:border-white/5">
<!-- Top Row: Icon + Name + Remaining -->
<div class="flex items-start justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-amber-100 dark:bg-amber-500/20 flex items-center justify-center text-amber-600 dark:text-amber-400 shrink-0">
<span class="material-symbols-outlined">lunch_dining</span>
</div>
<div class="flex flex-col">
<span class="font-bold text-base leading-tight">Food</span>
<span class="text-xs text-gray-500 dark:text-gray-400 font-medium">Monthly groceries</span>
</div>
</div>
<div class="flex flex-col items-end">
<div class="px-2 py-0.5 rounded-md bg-primary/10 dark:bg-primary/20 border border-primary/20">
<span class="text-xs font-bold text-primary tracking-wide">REM: $150</span>
</div>
</div>
</div>
<!-- Bottom Row: Inputs and Labels -->
<div class="grid grid-cols-2 gap-4 border-t border-gray-100 dark:border-white/5 pt-3">
<div class="flex flex-col justify-center">
<span class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-0.5">Planned</span>
<span class="text-base font-semibold text-gray-600 dark:text-gray-300">$500</span>
</div>
<div class="flex flex-col">
<label class="text-[10px] uppercase tracking-wider text-primary font-bold mb-1 text-right">Spent</label>
<input class="w-full bg-gray-50 dark:bg-[#112116] border border-gray-200 dark:border-primary/30 rounded-lg px-3 py-2 text-right font-bold text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm" type="text" value="$350"/>
</div>
</div>
</div>
<!-- Expense Item 2: Transport -->
<div class="bg-white dark:bg-[#1A2C22] p-4 rounded-xl shadow-sm border border-gray-100 dark:border-white/5">
<div class="flex items-start justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-500/20 flex items-center justify-center text-blue-600 dark:text-blue-400 shrink-0">
<span class="material-symbols-outlined">directions_bus</span>
</div>
<div class="flex flex-col">
<span class="font-bold text-base leading-tight">Transport</span>
<span class="text-xs text-gray-500 dark:text-gray-400 font-medium">Daily commute</span>
</div>
</div>
<div class="flex flex-col items-end">
<div class="px-2 py-0.5 rounded-md bg-primary/10 dark:bg-primary/20 border border-primary/20">
<span class="text-xs font-bold text-primary tracking-wide">REM: $150</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4 border-t border-gray-100 dark:border-white/5 pt-3">
<div class="flex flex-col justify-center">
<span class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-0.5">Planned</span>
<span class="text-base font-semibold text-gray-600 dark:text-gray-300">$200</span>
</div>
<div class="flex flex-col">
<label class="text-[10px] uppercase tracking-wider text-primary font-bold mb-1 text-right">Spent</label>
<input class="w-full bg-gray-50 dark:bg-[#112116] border border-gray-200 dark:border-primary/30 rounded-lg px-3 py-2 text-right font-bold text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm" type="text" value="$50"/>
</div>
</div>
</div>
<!-- Expense Item 3: Internet -->
<div class="bg-white dark:bg-[#1A2C22] p-4 rounded-xl shadow-sm border border-gray-100 dark:border-white/5">
<div class="flex items-start justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-purple-100 dark:bg-purple-500/20 flex items-center justify-center text-purple-600 dark:text-purple-400 shrink-0">
<span class="material-symbols-outlined">wifi</span>
</div>
<div class="flex flex-col">
<span class="font-bold text-base leading-tight">Internet</span>
<span class="text-xs text-gray-500 dark:text-gray-400 font-medium">Home fiber</span>
</div>
</div>
<div class="flex flex-col items-end">
<div class="px-2 py-0.5 rounded-md bg-gray-100 dark:bg-white/5 border border-transparent">
<span class="text-xs font-bold text-gray-400 dark:text-gray-500 tracking-wide">REM: $0</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4 border-t border-gray-100 dark:border-white/5 pt-3">
<div class="flex flex-col justify-center">
<span class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-0.5">Planned</span>
<span class="text-base font-semibold text-gray-600 dark:text-gray-300">$60</span>
</div>
<div class="flex flex-col">
<label class="text-[10px] uppercase tracking-wider text-primary font-bold mb-1 text-right">Spent</label>
<input class="w-full bg-gray-50 dark:bg-[#112116] border border-gray-200 dark:border-primary/30 rounded-lg px-3 py-2 text-right font-bold text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm" type="text" value="$60"/>
</div>
</div>
</div>
</div>
</section>
<!-- Bottom spacing for scroll -->
<div class="h-10"></div>
</main>
<!-- Sticky Footer Summary -->
<footer class="fixed bottom-0 left-0 w-full z-30">
<!-- Gradient Fade -->
<div class="h-12 w-full bg-gradient-to-b from-transparent to-background-light dark:to-background-dark pointer-events-none"></div>
<!-- Content Container -->
<div class="bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-xl px-6 pb-8 pt-2 border-t border-gray-200 dark:border-white/10">
<div class="flex flex-col gap-4 max-w-lg mx-auto">
<div class="flex items-baseline justify-between">
<span class="text-sm font-semibold text-gray-500 dark:text-gray-400">Projected Savings</span>
<div class="flex items-center gap-1">
<span class="text-2xl font-extrabold text-primary tracking-tight">$1,200</span>
</div>
</div>
<button class="group relative flex w-full items-center justify-center gap-2 rounded-xl bg-primary py-4 px-4 text-center font-bold text-background-dark shadow-[0_0_20px_rgba(25,230,94,0.3)] transition-all hover:bg-[#14cc52] active:scale-[0.98]">
<span class="material-symbols-outlined font-bold">lock</span>
<span>Close Month</span>
<div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 transition-opacity group-hover:opacity-100">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
</button>
</div>
</div>
</footer>
</body></html>
